<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICP Admin Access</title>
  <!-- No link to this page anywhere on the site -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0d2137;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:white;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .logo{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem;justify-content:center}
    .logo svg{width:32px;height:32px}
    .logo span{font-size:1rem;font-weight:700;color:#0d2137}
    h2{text-align:center;font-size:1.3rem;color:#0d2137;margin-bottom:.4rem}
    p.sub{text-align:center;font-size:.82rem;color:#5a7080;margin-bottom:2rem}
    label{display:block;font-size:.8rem;font-weight:500;color:#1a2e3a;margin-bottom:.35rem}
    input{width:100%;padding:.8rem 1rem;border:1.5px solid rgba(78,173,125,.2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;margin-bottom:1.1rem;transition:border-color .2s}
    input:focus{border-color:#4ead7d}
    button{width:100%;padding:.85rem;border-radius:100px;background:linear-gradient(135deg,#4ead7d,#2d9b6a);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:.3s}
    button:hover{opacity:.9;transform:translateY(-1px)}
    button:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .msg{margin-top:.75rem;font-size:.82rem;text-align:center}
    .msg.error{color:#c0392b}
    .msg.success{color:#2d9b6a}
    .back{display:block;text-align:center;margin-top:1.5rem;font-size:.8rem;color:#5a7080;text-decoration:none}
    .back:hover{color:#4ead7d}
    .security-note{background:#f0f9f5;border:1px solid rgba(78,173,125,.2);border-radius:8px;padding:.75rem 1rem;font-size:.75rem;color:#5a7080;margin-bottom:1.5rem;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18" stroke="#4ead7d" stroke-width="1.5"/>
        <path d="M20 4 L23 18 L20 36 L17 18 Z" fill="#4ead7d" opacity="0.9"/>
        <path d="M4 20 L18 17 L36 20 L18 23 Z" fill="#1a7a9a" opacity="0.9"/>
        <circle cx="20" cy="20" r="3" fill="#4ead7d"/>
      </svg>
      <span>Inner Compass Project</span>
    </div>
    <h2>Admin Access</h2>
    <p class="sub">This page is not publicly linked. Authorised personnel only.</p>
    <div class="security-note">🔒 Your session will be secured after login</div>

    {% if error %}
    <p class="msg error" style="margin-bottom:1rem">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/icp-admin-login">
      <label>Admin Email</label>
      <input type="email" name="email" placeholder="admin@innercompassproject.org" required autocomplete="username"/>
      <label>Password</label>
      <input type="password" name="password" placeholder="Your admin password" required autocomplete="current-password"/>
      <button type="submit">Access Admin Panel</button>
    </form>
    <a href="/" class="back">← Back to website</a>
  </div>
</body>
</html>
